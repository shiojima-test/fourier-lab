<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌊 SchooMy フーリエ変換ラボ v1.0</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --teal:#3AABA8;
  --teal-dark:#2a8a87;
  --cream:#F5E4C4;
  --cream-light:#FAF2DD;
  --orange:#E88A0A;
  --orange-dark:#c97208;
  --blue:#2E8EC4;
  --charcoal:#2C3338;
  --navy:#1E3A5F;
  --bg:#FAF7EE;
  --card:#FFFFFF;
  --border:rgba(44,51,56,0.10);
  --muted:#6B7780;
  --shadow:0 2px 8px rgba(44,51,56,0.06),0 1px 3px rgba(44,51,56,0.04);
  --shadow-lg:0 12px 32px rgba(44,51,56,0.10);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Meiryo","メイリオ",sans-serif;
  background:linear-gradient(180deg,var(--bg) 0%,var(--cream-light) 100%);
  color:var(--charcoal);
  min-height:100vh;
  padding:20px 16px 40px;
}
.container{max-width:1080px;margin:0 auto}

header{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding-bottom:18px;border-bottom:2px solid var(--border);margin-bottom:20px;
}
.title{
  font-size:24px;font-weight:900;color:var(--navy);
  display:flex;align-items:center;gap:10px;letter-spacing:.01em;
}
.title .ico{font-size:28px}
.title .sub{font-size:12px;color:var(--muted);font-weight:600;margin-left:6px}
.version{
  background:var(--cream);color:var(--orange-dark);
  padding:5px 12px;border-radius:14px;
  font-size:12px;font-weight:800;letter-spacing:.04em;
  border:1px solid rgba(232,138,10,0.3);
}

.sensor-row{
  display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;
}
.pill{
  font-family:inherit;cursor:pointer;
  background:#fff;border:1.5px solid var(--border);
  color:var(--charcoal);font-weight:700;font-size:13px;
  padding:9px 18px;border-radius:24px;
  transition:all .15s;
  display:flex;align-items:center;gap:6px;
}
.pill:hover{border-color:var(--teal);color:var(--teal)}
.pill.active{
  background:linear-gradient(135deg,var(--teal),var(--teal-dark));
  color:#fff;border-color:var(--teal-dark);
  box-shadow:0 3px 10px rgba(58,171,168,0.30);
}

.conn-bar{
  display:flex;flex-wrap:wrap;align-items:center;gap:12px;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:14px 18px;margin-bottom:18px;box-shadow:var(--shadow);
}
.btn{
  font-family:inherit;cursor:pointer;border:none;outline:none;
  padding:10px 20px;border-radius:10px;font-weight:800;font-size:14px;
  transition:all .15s;
}
.btn-primary{
  background:linear-gradient(135deg,var(--orange),var(--orange-dark));
  color:#fff;box-shadow:0 2px 8px rgba(232,138,10,0.30);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(232,138,10,0.40)}
.btn-secondary{
  background:#fff;color:var(--charcoal);border:1px solid var(--border);
}
.btn-secondary:hover{border-color:var(--orange);color:var(--orange)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

.conn-status{
  display:flex;align-items:center;gap:6px;
  font-size:13px;color:var(--muted);font-weight:700;
}
.conn-status .dot{width:9px;height:9px;border-radius:50%;background:#bbb}
.conn-status.connected .dot{background:var(--teal);box-shadow:0 0 0 3px rgba(58,171,168,0.22)}
.conn-status.connected{color:var(--teal)}

.fs-info{
  font-size:12px;color:var(--muted);
  background:var(--cream-light);padding:4px 12px;border-radius:8px;
  font-variant-numeric:tabular-nums;letter-spacing:.02em;
  border:1px solid rgba(232,138,10,0.15);
}

.panel{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:16px 18px 18px;margin-bottom:14px;box-shadow:var(--shadow);
}
.panel-head{
  display:flex;align-items:baseline;justify-content:space-between;gap:10px;
  margin-bottom:10px;
}
.panel-title{
  font-size:14px;font-weight:900;color:var(--navy);
  display:flex;align-items:center;gap:8px;
}
.panel-title .num{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;
  background:var(--navy);color:#fff;font-size:12px;font-weight:900;
}
.panel-sub{font-size:11px;color:var(--muted)}

.chart-body{height:200px;position:relative}
.chart-body canvas{width:100% !important;height:100% !important}
.panel.tall .chart-body{height:240px}

.peak-info{
  background:var(--cream);border-radius:12px;padding:14px 18px;
  margin-bottom:8px;
  border:1px solid rgba(232,138,10,0.25);
  font-size:14px;color:var(--charcoal);
  display:flex;flex-wrap:wrap;align-items:baseline;gap:6px 14px;
}
.peak-info .star{color:var(--orange);font-size:18px;font-weight:900}
.peak-info .main{font-weight:900;color:var(--charcoal);font-size:18px}
.peak-info .others{color:var(--muted);font-size:13px}
.peak-info b{font-variant-numeric:tabular-nums}

.empty{
  text-align:center;padding:30px;color:var(--muted);font-size:13px;
}
.hint{
  background:var(--cream-light);border-left:4px solid var(--blue);
  padding:10px 14px;border-radius:6px;font-size:12px;color:var(--charcoal);
  margin-bottom:14px;
}
footer{
  text-align:center;font-size:11px;color:var(--muted);
  margin-top:24px;padding-top:14px;border-top:1px solid var(--border);
}

@media (max-width:600px){
  body{padding:14px 10px 30px}
  .title{font-size:18px}
  .title .ico{font-size:22px}
  .title .sub{display:none}
  .chart-body{height:160px}
  .panel.tall .chart-body{height:200px}
  .pill{padding:7px 14px;font-size:12px}
}
</style>
</head>
<body>
<div class="container">

<header>
  <div class="title">
    <span class="ico">🌊</span><span>SchooMy フーリエ変換ラボ</span>
    <span class="sub">波形 × スペクトル × 分解sin波</span>
  </div>
  <div class="version">v1.0</div>
</header>

<div class="sensor-row" id="sensorPills">
  <button class="pill active" data-sensor="sound">🔊 音</button>
  <button class="pill" data-sensor="accel">📈 加速度</button>
  <button class="pill" data-sensor="light">💡 明るさ</button>
  <button class="pill" data-sensor="magnet">🧲 磁気</button>
</div>

<div class="conn-bar">
  <button class="btn btn-primary" id="connectBtn">🔌 USB接続</button>
  <button class="btn btn-secondary" id="disconnectBtn" style="display:none">切断</button>
  <div class="conn-status" id="connStatus"><div class="dot"></div><span>未接続</span></div>
  <div class="fs-info" id="fsInfo">fs ≒ -- Hz</div>
</div>

<div class="hint">📚 オレンジボードに対応スケッチを書き込み、PC と USB 接続してから「USB接続」を押してください。ブラウザは Chrome / Edge をお使いください。</div>

<div class="peak-info" id="peakInfo">
  <span class="star">★</span>
  <span>ピーク周波数: <span class="main" id="peakMain">--</span></span>
  <span class="others">他: <span id="peakOthers">--</span></span>
</div>

<div class="panel">
  <div class="panel-head">
    <div class="panel-title"><span class="num">1</span>元の波形 <span class="panel-sub">直近 2 秒</span></div>
    <div class="panel-sub" id="rawUnit">音 (生値)</div>
  </div>
  <div class="chart-body"><canvas id="rawChart"></canvas></div>
</div>

<div class="panel">
  <div class="panel-head">
    <div class="panel-title"><span class="num">2</span>スペクトル <span class="panel-sub">FFT 結果・最大ピークをハイライト</span></div>
  </div>
  <div class="chart-body"><canvas id="specChart"></canvas></div>
</div>

<div class="panel tall">
  <div class="panel-head">
    <div class="panel-title"><span class="num">3</span>分解 sin 波 <span class="panel-sub">上位 3 本 + 合成波 (破線)</span></div>
  </div>
  <div class="chart-body"><canvas id="reconChart"></canvas></div>
</div>

<footer>SchooMy フーリエ変換ラボ v1.0 — © スクーミー株式会社</footer>

</div>

<script>
// =============== 定数 ===============
const COLORS = {
  teal:'#3AABA8', orange:'#E88A0A', blue:'#2E8EC4',
  charcoal:'#2C3338', navy:'#1E3A5F', cream:'#F5E4C4'
};
const SENSORS = {
  sound:   { label:'音 (生値 0-1023)' },
  accel:   { label:'加速度 (g)' },
  light:   { label:'明るさ (kΩ換算)' },
  magnet:  { label:'磁気 (生値 0-1023)' }
};
const WINDOW_SEC   = 2.0;     // 解析窓 [秒]
const BUFFER_SEC   = 5.0;     // リングバッファ保持時間 [秒]
const ANALYZE_MS   = 500;     // 解析実行間隔
const SIN_COUNT    = 3;       // 重ね描きする sin 波の本数

// =============== State ===============
let currentSensor = 'sound';
let port = null;
let reader = null;
let connected = false;
let ring = [];                 // [{value, t}]  t は performance.now() ms
let lastAnalyzeAt = 0;

const $ = id => document.getElementById(id);

// =============== Chart 初期化 ===============
function makeLineChart(canvasId, color, opts){
  return new Chart($(canvasId), {
    type:'line',
    data:{ datasets:[{
      data:[], borderColor:color, backgroundColor:color+'1A',
      borderWidth:2, pointRadius:0, tension:0.3, fill:false
    }]},
    options:Object.assign({
      responsive:true, maintainAspectRatio:false, animation:false,
      parsing:false, normalized:true,
      plugins:{ legend:{display:false}, tooltip:{enabled:false} },
      scales:{
        x:{ type:'linear', min:0, max:WINDOW_SEC,
            ticks:{ callback:v=>v.toFixed(1)+'s', maxTicksLimit:5, font:{size:11} },
            grid:{color:'rgba(44,51,56,0.06)'},
            title:{display:true,text:'時間 (秒)', font:{size:11}} },
        y:{ ticks:{ font:{size:11} }, grid:{color:'rgba(44,51,56,0.06)'} }
      }
    }, opts||{})
  });
}

const rawChart = makeLineChart('rawChart', COLORS.teal);

const specChart = new Chart($('specChart'), {
  type:'bar',
  data:{ labels:[], datasets:[{
    data:[], backgroundColor:[], borderColor:[], borderWidth:1,
    barPercentage:1, categoryPercentage:1
  }]},
  options:{
    responsive:true, maintainAspectRatio:false, animation:false,
    plugins:{ legend:{display:false}, tooltip:{
      callbacks:{
        title:items=>items.length?(items[0].label+' Hz'):'',
        label:c=>'相対強度: '+c.parsed.y.toFixed(2)
      }
    } },
    scales:{
      x:{ title:{display:true,text:'周波数 (Hz)', font:{size:11}},
          ticks:{ maxRotation:0, autoSkip:true, maxTicksLimit:8, font:{size:11} },
          grid:{display:false} },
      y:{ min:0, max:1.05,
          ticks:{ font:{size:11} }, grid:{color:'rgba(44,51,56,0.06)'},
          title:{display:true,text:'相対強度', font:{size:11}} }
    }
  }
});

const reconChart = new Chart($('reconChart'), {
  type:'line',
  data:{ datasets:[
    { label:'sin 1', data:[], borderColor:COLORS.orange, borderWidth:2, pointRadius:0, tension:0.0, fill:false },
    { label:'sin 2', data:[], borderColor:COLORS.blue,   borderWidth:2, pointRadius:0, tension:0.0, fill:false },
    { label:'sin 3', data:[], borderColor:COLORS.teal,   borderWidth:2, pointRadius:0, tension:0.0, fill:false },
    { label:'合成 (sin 1+2+3)', data:[], borderColor:COLORS.charcoal,
      borderWidth:2.5, borderDash:[6,5], pointRadius:0, tension:0.0, fill:false }
  ]},
  options:{
    responsive:true, maintainAspectRatio:false, animation:false,
    parsing:false, normalized:true,
    plugins:{ legend:{position:'top',align:'end',labels:{boxWidth:14,padding:8,font:{size:11,weight:'600'}}},
              tooltip:{enabled:false} },
    scales:{
      x:{ type:'linear', min:0, max:WINDOW_SEC,
          ticks:{ callback:v=>v.toFixed(1)+'s', maxTicksLimit:5, font:{size:11} },
          grid:{color:'rgba(44,51,56,0.06)'},
          title:{display:true,text:'時間 (秒)', font:{size:11}} },
      y:{ ticks:{ font:{size:11} }, grid:{color:'rgba(44,51,56,0.06)'} }
    }
  }
});

// =============== FFT (Cooley-Tukey radix-2, in-place) ===============
function fft(re, im){
  const n = re.length;
  // bit-reversal
  let j = 0;
  for(let i = 1; i < n; i++){
    let bit = n >> 1;
    while(j & bit){ j ^= bit; bit >>= 1; }
    j ^= bit;
    if(i < j){
      let tmp = re[i]; re[i] = re[j]; re[j] = tmp;
      tmp = im[i]; im[i] = im[j]; im[j] = tmp;
    }
  }
  // butterfly
  for(let len = 2; len <= n; len <<= 1){
    const half = len >> 1;
    const ang  = -2 * Math.PI / len;
    const wre0 = Math.cos(ang), wim0 = Math.sin(ang);
    for(let i = 0; i < n; i += len){
      let wre = 1, wim = 0;
      for(let k = 0; k < half; k++){
        const idx1 = i + k, idx2 = idx1 + half;
        const tr = re[idx2]*wre - im[idx2]*wim;
        const ti = re[idx2]*wim + im[idx2]*wre;
        re[idx2] = re[idx1] - tr;
        im[idx2] = im[idx1] - ti;
        re[idx1] += tr;
        im[idx1] += ti;
        const nwre = wre*wre0 - wim*wim0;
        wim = wre*wim0 + wim*wre0;
        wre = nwre;
      }
    }
  }
}

// =============== 解析 ===============
// 不等間隔サンプル → 線形補間で等間隔化 → 中心化 → Hann 窓 → FFT
function analyze(){
  const now = performance.now();
  const since = now - WINDOW_SEC * 1000;
  // 直近 WINDOW_SEC 秒のサンプル
  const segStart = ring.findIndex(s => s.t >= since);
  if(segStart < 0) return null;
  const seg = ring.slice(segStart);
  if(seg.length < 16) return null;

  // 実効サンプリングレート
  const span = seg[seg.length-1].t - seg[0].t;
  if(span <= 0) return null;
  const fs = (seg.length - 1) / (span / 1000);

  // FFT 長
  let N = 512;
  if(seg.length < 256) N = 256;
  else if(seg.length >= 1024) N = 1024;

  // 等間隔化 (線形補間)
  const t0 = seg[0].t;
  const tEnd = seg[seg.length-1].t;
  const step = (tEnd - t0) / (N - 1);
  const x = new Float64Array(N);
  let j = 0;
  for(let i = 0; i < N; i++){
    const ti = t0 + i * step;
    while(j < seg.length - 2 && seg[j+1].t < ti) j++;
    const a = seg[j];
    const b = seg[j+1] || a;
    const dt = b.t - a.t;
    const r = (dt === 0) ? 0 : (ti - a.t) / dt;
    x[i] = a.value + (b.value - a.value) * r;
  }

  // 元波形 (中心化前) を保存しておく (チャート1用)
  const rawCopy = new Float64Array(x);

  // 中心化 (直流除去)
  let mean = 0;
  for(let i = 0; i < N; i++) mean += x[i];
  mean /= N;
  for(let i = 0; i < N; i++) x[i] -= mean;

  // 中心化済みのコピー (チャート3との比較用)
  const xCentered = new Float64Array(x);

  // Hann 窓 → FFT 入力
  const re = new Float64Array(N);
  const im = new Float64Array(N);
  for(let i = 0; i < N; i++){
    const w = 0.5 * (1 - Math.cos(2*Math.PI*i/(N-1)));
    re[i] = x[i] * w;
    im[i] = 0;
  }
  fft(re, im);

  // 片側スペクトル振幅
  const NHalf = N >> 1;
  const mags = new Float64Array(NHalf);
  let magMax = 0;
  for(let k = 1; k < NHalf; k++){
    mags[k] = Math.sqrt(re[k]*re[k] + im[k]*im[k]);
    if(mags[k] > magMax) magMax = mags[k];
  }

  // ピーク抽出 (隣接ビンは局所極大1個に絞る)
  const peakCandidates = [];
  for(let k = 2; k < NHalf - 1; k++){
    if(mags[k] > mags[k-1] && mags[k] >= mags[k+1] && mags[k] > magMax * 0.05){
      peakCandidates.push({ k, mag: mags[k] });
    }
  }
  peakCandidates.sort((a,b) => b.mag - a.mag);
  const peaks = peakCandidates.slice(0, SIN_COUNT).map(p => ({
    k: p.k,
    f: p.k * fs / N,
    mag: p.mag,
    // Hann のコヒーレントゲイン 0.5 で補正した片側振幅
    A: (2 / N) * p.mag / 0.5,
    phi: Math.atan2(im[p.k], re[p.k])
  }));
  // 周波数順に並べておく (色の対応を見やすく)
  peaks.sort((a,b)=>a.f-b.f);

  return { fs, N, mags, magMax, peaks, raw: rawCopy, centered: xCentered, span };
}

// =============== 描画 ===============
function refreshCharts(){
  const res = analyze();
  if(!res){
    $('fsInfo').textContent = connected ? 'fs ≒ サンプル待機中' : 'fs ≒ -- Hz';
    return;
  }
  const { fs, N, mags, magMax, peaks, centered, raw } = res;

  $('fsInfo').textContent = 'fs ≒ ' + fs.toFixed(0) + ' Hz';

  // --- ピーク表示 ---
  if(peaks.length){
    const sorted = peaks.slice().sort((a,b)=>b.mag-a.mag);
    $('peakMain').textContent = sorted[0].f.toFixed(1) + ' Hz';
    $('peakOthers').textContent = sorted.slice(1).map(p=>p.f.toFixed(1)+' Hz').join(', ') || '--';
  } else {
    $('peakMain').textContent = '--';
    $('peakOthers').textContent = '--';
  }

  // --- ① 元の波形 (中心化前) ---
  const rawData = new Array(N);
  for(let i = 0; i < N; i++){
    rawData[i] = { x: i * WINDOW_SEC / (N - 1), y: raw[i] };
  }
  rawChart.data.datasets[0].data = rawData;
  rawChart.data.datasets[0].label = SENSORS[currentSensor].label;
  // Y 軸自動
  let rmin = Infinity, rmax = -Infinity;
  for(let i = 0; i < N; i++){ if(raw[i] < rmin) rmin = raw[i]; if(raw[i] > rmax) rmax = raw[i]; }
  const pad = Math.max(1e-3, (rmax - rmin) * 0.1);
  rawChart.options.scales.y.min = rmin - pad;
  rawChart.options.scales.y.max = rmax + pad;
  rawChart.update('none');

  // --- ② スペクトル ---
  // 0Hz は除外、ナイキスト未満まで表示
  const NHalf = N >> 1;
  const labels = new Array(NHalf - 1);
  const values = new Array(NHalf - 1);
  const bg = new Array(NHalf - 1);
  const bd = new Array(NHalf - 1);
  // 最大ピーク (強度順) のビン
  const topMagBin = peaks.length
    ? peaks.slice().sort((a,b)=>b.mag-a.mag)[0].k
    : -1;
  for(let k = 1; k < NHalf; k++){
    const idx = k - 1;
    labels[idx] = (k * fs / N).toFixed(1);
    values[idx] = magMax > 0 ? mags[k] / magMax : 0;
    if(k === topMagBin){
      bg[idx] = COLORS.orange;
      bd[idx] = COLORS.orange;
    } else {
      bg[idx] = COLORS.teal + 'AA';
      bd[idx] = COLORS.teal;
    }
  }
  specChart.data.labels = labels;
  specChart.data.datasets[0].data = values;
  specChart.data.datasets[0].backgroundColor = bg;
  specChart.data.datasets[0].borderColor = bd;
  specChart.update('none');

  // --- ③ 分解 sin 波 + 合成 ---
  const M = 400; // プロット解像度
  const sinColors = [COLORS.orange, COLORS.blue, COLORS.teal];
  const sinDatasets = [[], [], []];
  const combined = [];
  for(let i = 0; i < M; i++){
    const t = i * WINDOW_SEC / (M - 1);
    let sumY = 0;
    for(let p = 0; p < SIN_COUNT; p++){
      const peak = peaks[p];
      let y = 0;
      if(peak){
        y = peak.A * Math.cos(2*Math.PI*peak.f*t + peak.phi);
        sumY += y;
      }
      sinDatasets[p].push({ x: t, y });
    }
    combined.push({ x: t, y: sumY });
  }
  for(let p = 0; p < SIN_COUNT; p++){
    reconChart.data.datasets[p].data = sinDatasets[p];
    reconChart.data.datasets[p].borderColor = sinColors[p];
    const peak = peaks[p];
    reconChart.data.datasets[p].label = peak
      ? `sin${p+1} (${peak.f.toFixed(1)} Hz)`
      : `sin${p+1}`;
  }
  reconChart.data.datasets[3].data = combined;
  // Y 軸: 中心化済 raw と合成の両方が収まるように
  let ymin = Infinity, ymax = -Infinity;
  for(let i = 0; i < N; i++){ if(centered[i] < ymin) ymin = centered[i]; if(centered[i] > ymax) ymax = centered[i]; }
  for(const p of combined){ if(p.y < ymin) ymin = p.y; if(p.y > ymax) ymax = p.y; }
  const padR = Math.max(1e-3, (ymax - ymin) * 0.12);
  reconChart.options.scales.y.min = ymin - padR;
  reconChart.options.scales.y.max = ymax + padR;
  reconChart.update('none');
}

// =============== ループ ===============
function tick(){
  const now = performance.now();
  if(now - lastAnalyzeAt >= ANALYZE_MS){
    refreshCharts();
    lastAnalyzeAt = now;
  }
  requestAnimationFrame(tick);
}

// =============== Web Serial ===============
async function connect(){
  if(!('serial' in navigator)){
    alert('このブラウザは Web Serial API に対応していません。Chrome / Edge をお使いください。');
    return;
  }
  try {
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 9600 });
    connected = true;
    ring = [];
    lastAnalyzeAt = 0;
    $('connectBtn').style.display = 'none';
    $('disconnectBtn').style.display = '';
    $('connStatus').classList.add('connected');
    $('connStatus').querySelector('span').textContent = '接続中 (9600 bps)';
    readLoop();
  } catch(e){
    console.error(e);
    if(e && e.name !== 'NotFoundError') alert('接続に失敗しました: ' + (e.message || e));
  }
}

async function disconnect(){
  connected = false;
  try { if(reader){ await reader.cancel().catch(()=>{}); try{ reader.releaseLock(); }catch(_){} reader = null; } } catch(e){}
  try { if(port){ await port.close().catch(()=>{}); } } catch(e){}
  port = null;
  $('connectBtn').style.display = '';
  $('disconnectBtn').style.display = 'none';
  $('connStatus').classList.remove('connected');
  $('connStatus').querySelector('span').textContent = '未接続';
  $('fsInfo').textContent = 'fs ≒ -- Hz';
}

async function readLoop(){
  const dec = new TextDecoderStream();
  port.readable.pipeTo(dec.writable).catch(()=>{});
  reader = dec.readable.getReader();
  let buf = '';
  while(connected){
    try {
      const { value, done } = await reader.read();
      if(done) break;
      buf += value;
      const lines = buf.split(/\r?\n/);
      buf = lines.pop();
      for(const l of lines){
        const m = l.trim().match(/-?\d+(\.\d+)?/);
        if(m){
          const n = parseFloat(m[0]);
          if(!isNaN(n)) pushSample(n);
        }
      }
    } catch(e){ break; }
  }
}

function pushSample(v){
  const t = performance.now();
  ring.push({ value: v, t });
  // バッファ長制限 (時間ベース)
  const cutoff = t - BUFFER_SEC * 1000;
  while(ring.length && ring[0].t < cutoff) ring.shift();
}

// =============== Events ===============
$('connectBtn').addEventListener('click', connect);
$('disconnectBtn').addEventListener('click', disconnect);

document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSensor = btn.dataset.sensor;
    $('rawUnit').textContent = SENSORS[currentSensor].label;
  });
});

// =============== Init ===============
$('rawUnit').textContent = SENSORS[currentSensor].label;
requestAnimationFrame(()=>{ try{ rawChart.resize(); specChart.resize(); reconChart.resize(); }catch(e){} });
tick();
</script>
